<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Catálogo de Productos Millenial System" />
    <title>Catálogo de Productos</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet" />
</head>

<body>
    <!-- Header -->
    <header>
        <h1>Millenial System</h1>
        <nav>
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#productos">Productos</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <!-- Carrusel principal -->
    <section id="carrusel-principal" class="carrusel-principal">
        <div class="imagenes">
            <!-- Imágenes del carrusel se cargarán dinámicamente -->
        </div>
    </section>

    <!-- Barra horizontal para categorías -->
    <section id="barra-categorias-horizontal" class="barra-horizontal">
        <ul id="lista-categorias-horizontal"></ul>
    </section>

    <!-- Barra lateral de redes sociales -->
    <aside id="redes-sociales">
        <ul>
            <li>
                <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer">
                    <img src="./icons/facebook.jpg" alt="Icono de Facebook" />
                </a>
            </li>
            <li>
                <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer">
                    <img src="./icons/instagram.jpg" alt="Icono de Instagram" />
                </a>
            </li>
            <li>
                <a href="https://www.twitter.com" target="_blank" rel="noopener noreferrer">
                    <img src="./icons/twitter.jpg" alt="Icono de Twitter" />
                </a>
            </li>
        </ul>
    </aside>

    <!-- Contenedor principal de productos -->
    <main id="contenedor-productos">
        <!-- Aquí se inyectará el listado de productos dinámicamente -->
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2025 Catálogo de Productos Millenial System</p>
    </footer>

    <script src="./js/script.js"></script>
</body>

</html>
