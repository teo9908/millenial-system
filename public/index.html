<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

</head>


<body>

    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------->
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------->

    <!-------------------------------------------------------- Header de la pagina -------------------------------------------------------------------------------------------------->

    <header>
        <h1>Millenial System</h1>
        <nav>
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#productos">Productos</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>


    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------->
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------->

    <!------------------------------------------------- Creacion de un carrusel de imagenes automatico ------------------------------------------------------------------------------->

    <div id="carrusel-principal" class="carrusel-principal">
        <div class="imagenes">
            <!-- Aquí van las imágenes del carrusel -->
        </div>
    </div>

    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------->
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------->

    <!------------------------------------------------- Creacion de una barra horizontal para mostrar las categorias de los productos ----------------------------------------------->

    <div id="barra-categorias-horizontal" class="barra-horizontal">
        <ul id="lista-categorias-horizontal">
            <!-- Aquí van las categorías dinámicamente -->
        </ul>
    </div>


    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------->
    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------------->

    <!------------------------------------------------- Creacion de una barra lateral para ir a redes sociales ---------------------------------------------------------------------->


    <aside id="redes-sociales">
        <ul>
            <li>
                <a href="https://www.facebook.com" target="_blank">
                    <img src="./icons/facebook.jpg" alt="">
                </a>
            </li>
            <li>
                <a href="https://www.instagram.com" target="_blank">
                    <img src="./icons/instagram.jpg" alt="">
                </a>
            </li>
            <li>
                <a href="https://www.twitter.com" target="_blank">
                    <img src="./icons/twitter.jpg" alt="">
                </a>
            </li>
        </ul>
    </aside>
    
    
    
    <!----------------------------------------------------------------------------------------------------------------------------------------------------------------------------->
    <!----------------------------------------------------------------------------------------------------------------------------------------------------------------------------->

    <!------------------------------------------------- Contenador de productos en el main ---------------------------------------------------------------------------------------->


    <main id="contenedor-productos">
        <!-- Aquí se insertarán los productos dinámicamente con JavaScript-->
    </main>



    
    <footer>
        <p>© 2025 Catálogo de Productos Millenial System</p>
    </footer>

    <script src="./js/script.js"></script>

</body>

</html>
